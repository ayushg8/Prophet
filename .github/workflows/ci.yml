name: ci

on:
  push:
  pull_request:

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Diff whitespace check
        run: |
          set -euo pipefail
          if [ -n "${GITHUB_BASE_REF:-}" ]; then
            git fetch origin "$GITHUB_BASE_REF" --depth=1
            git diff --check "origin/$GITHUB_BASE_REF"...HEAD
          else
            git diff --check HEAD^..HEAD 2>/dev/null || git diff --check
          fi
      - name: Release safety scan
        run: |
          set -euo pipefail
          python3 scripts/check-release-safety.py --tracked --paths-only
          if [ -n "${GITHUB_BASE_REF:-}" ]; then
            python3 scripts/check-release-safety.py --changed-from "origin/$GITHUB_BASE_REF"...HEAD
          else
            python3 scripts/check-release-safety.py --changed-from HEAD^..HEAD
          fi
      - name: Production readiness scorecard
        run: python3 scripts/production-readiness-scorecard.py --backlog docs/production-readiness-backlog.json >/tmp/prophet-production-readiness.json
      - name: Markdown local link check
        run: python3 scripts/check-doc-links.py
      - name: Customer validation scorecard
        run: python3 scripts/customer-validation-scorecard.py --log docs/customer-validation-log.example.json >/tmp/prophet-customer-validation.json
      - name: Validation targets scorecard
        run: python3 scripts/validation-targets-scorecard.py --targets docs/validation-targets.example.json >/tmp/prophet-validation-targets.json
      - name: Validation sprint dashboard
        run: |
          python3 scripts/validation-sprint-dashboard.py \
            --log docs/customer-validation-log.example.json \
            --targets docs/validation-targets.example.json \
            >/tmp/prophet-validation-dashboard.json
      - name: Cyber-side contract tests
        run: PYTHONPATH=cyber-side python3 -m unittest discover -s cyber-side/tests -v
      - name: World-side forecaster tests
        run: PYTHONPATH=world-side:world-side/scraper:. python3 -m unittest discover -s world-side/tests -v
      - name: Asset seedset tests
        run: PYTHONPATH=. python3 -m unittest discover -s assets/tests -v
      - name: Production platform tests
        run: PYTHONPATH=. python3 -m unittest discover -s prophet_platform/tests -v
      - name: Sandbox runner tests
        run: PYTHONPATH=.:cyber-side python3 -m unittest discover -s sandbox_runner/tests -v
      - name: Policy lint tests
        run: PYTHONPATH=.:cyber-side:world-side python3 -m unittest discover -s policy/tests -v
      - name: Release safety scan tests
        run: python3 -m unittest discover -s scripts/tests -v
      - name: Policy examples schema validation, lint, and compare
        run: |
          set -euo pipefail
          export PYTHONPATH=.:cyber-side:world-side
          for policy in policy/prophet-pilot-policy.json policy/examples/*.json; do
            python3 -m policy.lint \
              --policy "$policy" \
              --schema policy/prophet-pilot-policy.schema.json >/tmp/prophet-policy-lint.json
          done
          for policy in policy/examples/*.json; do
            python3 -m policy.lint \
              --policy "$policy" \
              --schema policy/prophet-pilot-policy.schema.json \
              --compare-to policy/prophet-pilot-policy.json >/tmp/prophet-policy-compare.json
          done
      - name: Evidence bundle tests
        run: PYTHONPATH=.:cyber-side:world-side python3 -m unittest discover -s evidence/tests -v
      - name: Integration export tests
        run: PYTHONPATH=.:cyber-side:world-side python3 -m unittest discover -s integrations/tests -v
      - name: Linux fresh-clone pilot smoke preflight
        run: ./scripts/check-local-env.sh
      - name: Linux fresh-clone pilot smoke
        run: ./scripts/run-pilot-demo-smoke.sh
      - name: Prediction portfolio fixture validation
        run: |
          PYTHONPATH=cyber-side python3 -m predictor --validate-only \
            --forecast cyber-side/fixtures/predicted-exploit-portfolio-edge-appliance.json

  console:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: prophet-console
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: prophet-console/package-lock.json
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: npm ci
      - run: npm run lint
      - run: npm run build
      - run: npm audit --audit-level=moderate
      - run: npm run test:control:evidence
