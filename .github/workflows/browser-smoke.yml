name: browser-smoke

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  browser-smoke:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: prophet-console
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: prophet-console/package-lock.json
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run test:smoke
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: prophet-console-playwright-failure
          path: |
            prophet-console/test-results/
            prophet-console/playwright-report/
